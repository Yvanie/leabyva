<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leabyva Digital Works | Bientôt disponible</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <div class="card">
            <img src="logo.jpg" alt="Leabyva Logo" class="logo">
            
            <h1>L'innovation <span class="text-pink">Digital</span> arrive</h1>
            <p>Nous concevons vos solutions sur mesure. Visibilité, productivité et optimisation.</p>

            <div id="countdown" class="countdown">
                <div class="time-box"><span id="days">00</span><small>Jours</small></div>
                <div class="time-box"><span id="hours">00</span><small>Heures</small></div>
                <div class="time-box"><span id="minutes">00</span><small>Min</small></div>
                <div class="time-box"><span id="seconds">00</span><small>Sec</small></div>
            </div>

            <form action="https://formspree.io/f/VOTRE_ID_FORMSPREE" method="POST" class="contact-form">
                <input type="email" name="email" placeholder="Votre adresse email" required>
                <button type="submit">Avertissez-moi</button>
            </form>

            <div class="whatsapp-section">
                <p>Un projet urgent ?</p>
                <a href="https://wa.me/237694526505?text=Bonjour%20Leabyva,%20j'ai%20un%20projet%20digital..." target="_blank" class="btn-wa">
                    Discuter sur WhatsApp
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
